# CoLab security (penetration-testing) environment.
# ----------------------------------------------------------------------------
# A self-contained, isolated stack for the authorized FERPA compliance test:
#
#   pentest  ── Kali toolbox (operator box; you exec into this)
#      │
#   app      ── CoLab in PRODUCTION mode (heroku-26 + Ruby + jemalloc + Node)
#      │            the system under test
#   db       ── MariaDB holding the (production-shaped) student data
#
# No redis service: CoLab's Action Cable is configured for adapter: redis in
# production, but the `redis` gem is not in the bundle, so the target cannot
# actually use redis. Dropping it saves memory. (The dev stack keeps redis for
# Moodle, which is not part of this engagement.)
#
# Isolation: this is a separate compose project ("sec_env"), so its network is
# distinct from the dev stack's ("dev_env"). Only the target's web port is
# published to the host (for the operator's browser); the db stays internal to
# the engagement network. Drive everything with ../../sec_serv.sh.
# ----------------------------------------------------------------------------
services:
  # CoLab — production target (system under test).
  app:
    image: colab_prod_server
    build:
      context: ../..
      dockerfile: containers/agnostic/colab_prod/Dockerfile
    hostname: colab-prod
    # Survive Podman/host restarts; keep retrying if a transient boot error hits.
    restart: unless-stopped
    # Wait until the DB is *actually* ready (init scripts done) — not just its TCP
    # port — so first-boot migrations never race a half-initialised database.
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Point Rails at the sandbox prod DB (overrides config/database.yml).
      - DATABASE_URL=mysql2://prod:prod@db:3306/colab_prod
      - COLAB_DATABASE_PASSWORD=prod
      - RAILS_ENV=production
      - RACK_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - PORT=3000
      # jemalloc (gaffneyc buildpack) — enabled with the recommended Rails tuning.
      - JEMALLOC_ENABLED=true
      - MALLOC_CONF=dirty_decay_ms:1000,narenas:2,background_thread:true
      # Apply migrations automatically on boot so the target is ready to test.
      - RUN_DB_MIGRATE_ON_BOOT=true
      # secret_key_base is REQUIRED in production. This is a FIXED, known SANDBOX
      # value — same philosophy as the prod/prod DB creds and the intentionally
      # weak seeded passwords. Having it in the container env (not just generated
      # inside the web process) is what lets EVERY production process work:
      # the Puma server AND `rails db:seed` / console / runner / rake tasks run
      # via `exec`. It only signs cookies for a throwaway target holding synthetic
      # data, so it is not sensitive. Override with your own COLAB_SECRET_KEY_BASE
      # (or RAILS_MASTER_KEY) for full production fidelity.
      - SECRET_KEY_BASE=${COLAB_SECRET_KEY_BASE:-b61117c631a312ace765c4929ae7ad0613d15f240e600e796e3f50ce485b08baa7d30e0e42fc10b58794bc450bf2734aeb2d6a9da1e2dc97ac50d5ffdcb485d7}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY:-}
    ports:
      # Direct HTTP access (recon/tools, and in-network app:3000). NOTE: login
      # won't persist over plain HTTP because the session cookie is Secure +
      # SameSite=None — use the HTTPS proxy below (https://localhost:13443).
      - 13000:3000
    networks:
      - engagement_net

  # TLS-terminating reverse proxy (Caddy) — mirrors the real CoLab.online setup
  # (app runs behind an SSL proxy; config.assume_ssl = true). Serves HTTPS so the
  # Secure/SameSite=None session cookie works and LOGIN persists.
  # Browse the functional target at: https://localhost:13443 (self-signed cert).
  proxy:
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - 13443:443
    volumes:
      - ../sec_env/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    networks:
      - engagement_net

  # MariaDB — student-data store. Reuses the dev DB image (root pw + base privs)
  # and layers the sec-specific prod DB/user via an extra init script.
  db:
    image: colab_db
    build:
      context: ../..
      dockerfile: containers/agnostic/db/Dockerfile
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=test
      - MYSQL_DATABASE=colab_prod
    volumes:
      - secdata:/var/lib/mysql
      # Runs after the image's /docker-entrypoint-initdb.d/init-privs.sql
      # (alphabetical order) to add the colab_prod DB + 'prod' user.
      - ../sec_initDBs.sql:/docker-entrypoint-initdb.d/zz-sec-initDBs.sql:ro
    # Readiness gate: passes only once the init scripts have created the
    # colab_prod DB and the 'prod' user, so dependents never see a half-init DB.
    healthcheck:
      test: ["CMD-SHELL", "mariadb -uprod -pprod colab_prod -e 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s
    # Intentionally NOT published to the host: the DB is reachable only from
    # inside the engagement network (i.e. via the app or the pentest box).
    networks:
      - engagement_net

  # Kali pentesting toolbox — the operator box.
  pentest:
    image: colab_pentest
    build:
      context: ../..
      dockerfile: containers/agnostic/pentest/Dockerfile
    hostname: pentest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    # nmap raw-socket scans, ping, and tcpdump/tshark capture need these caps.
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - TARGET_URL=http://app:3000
      - TARGET_HOST=app
      - TARGET_DB_HOST=db
      - TARGET_DB_PORT=3306
    volumes:
      # Persist engagement notes/evidence across container restarts.
      - engagement_data:/root/engagement
      # White-box assist: the app source, read-only, for secret scanning
      # (gitleaks) and source-informed testing. Remove for strict black-box.
      - ../../:/opt/colab-src:ro
    networks:
      - engagement_net
    command: ["sleep", "infinity"]

networks:
  # Dedicated bridge for the engagement. Being a separate compose project, this
  # is already isolated from the dev stack; naming it makes the boundary explicit.
  engagement_net:
    driver: bridge

volumes:
  secdata:
  engagement_data:
  caddydata:
