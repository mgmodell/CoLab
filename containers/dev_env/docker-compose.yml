services:
  app:
    image: colab_dev_server
    build:
      context: ../..
      dockerfile: containers/agnostic/dev_server/Dockerfile
    # On Linux with rootless Podman, add docker-compose.rootless.yml to your
    # devcontainer.json dockerComposeFile list to enable userns_mode: keep-id,
    # which maps your host UID into the container so bind-mounted files stay writable.
    hostname: dev-serv-${HOSTNAME:-colab-dev}
    environment:
      - PARENT=${HOSTNAME:-colab-dev}
    ports:
      - 3000:3000
      - 3035:3035
      - 3443:3443
    depends_on:
      - db
    volumes:
      - ../../:/home/colab/src/app:cached
      # Use a named volume for node_modules so the container always holds
      # Linux-native binaries regardless of what is installed on the Windows
      # (or macOS) host.  Without this, packages like @rspack/binding that
      # ship platform-specific optional native extensions end up with the
      # wrong architecture in the bind-mounted directory.
      - devnodemodules:/home/colab/src/app/node_modules
      - devmise:/home/colab/.local/share/mise
    command: zsh -c "sleep infinity"
  db:
    image: colab_db
    build:
      context: ../..
      dockerfile: containers/agnostic/db/Dockerfile
    restart: unless-stopped
    ports:
      - 31337:3306
    volumes:
      - devdata:/var/lib/mysql

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - 6379:6379
  # Docs at https://github.com/MRColorR/vnc-browser
  browser:
    container_name: vnc-browser
    image: mrcolorrain/vnc-browser:debian
    ports:
      - 5909:5900
      - 6080:6080
    environment:
      VNC_PASSWORD: "password"
      AUTO_START_XTERM: "false"
    restart: unless-stopped

  selenium:
    image: colab_browser
    build:
      context: ../..
      dockerfile: containers/agnostic/browser/Dockerfile
    shm_size: '512mb'
    ports:
      - 4444:4444
      - 5900:5900
      - 7900:7900

  moodle:
    image: colab_moodle
    build:
      context: ../..
      dockerfile: containers/agnostic/moodle/Dockerfile
    depends_on:
      - db
    environment:
      - MOODLE_LANGUAGE=en
      - LANG=en_US:en
      - SITE_URL=http://moodle:8080
      - MOODLE_URL=http://moodle:8080
      - DB_TYPE=mariadb
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=moodle
      - DB_USER=moodle
      - DB_PASSWORD=moodle

      - MOODLE_REVERSEPROXY=false
      - MOODLE_SSLPROXY=false
      - MOODLE_EMAIL=user@example.com
      - MOODLE_SITE_NAME=CoLab-Testing
      - MOODLE_USERNAME=moodleuser
      - MOODLE_PASSWORD=CHANGEME

      - MOODLE_SMTP_HOST=smtp.gmail.com
      - MOODLE_SMTP_PORT_NUMBER=587
      - MOODLE_SMTP_USER=micah.modell+moodle@gmail.com
      - MOODLE_SMTP_PASSWORD=CHANGEME
      - MOODLE_MAIL_NOREPLY_ADDRESS=noreply@localhost
      - MOODLE_MAIL_PREFIX=[colab-moodle]

      - REDIS_HOST=redis
    ports:
      - 8080:8080
    volumes:
      - moodledata:/var/www/moodledata
      - moodlehtml:/var/www/html


volumes:
  devmise:
  devnodemodules:
  mariadb-data:
  ffconfig:
  devdata:
  moodledata:
  moodlehtml:

