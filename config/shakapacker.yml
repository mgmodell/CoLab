# Note: You must restart bin/shakapacker-dev-server for changes to take effect

default: &default
  source_path: app/javascript
  source_entry_path: packs
  public_root_path: public
  public_output_path: packs
  cache_path: tmp/shakapacker
  webpack_compile_output: true
  assets_bundler: "rspack"

  # Additional paths webpack should lookup modules
  # ['app/assets', 'engine/foo/app/assets']
  additional_paths: []

  # Reload manifest.json on all requests so we reload latest compiled packs
  cache_manifest: false

development:
  <<: *default
  # This is false since we're running `bin/shakapacker -w` in Procfile.dev-static
  compile: false

  # Reference: https://webpack.js.org/configuration/dev-server/
  dev_server:
    # Default to plain HTTP/WS so normal `dev_serv.sh -s` development does not
    # require trusting a separate dev-server certificate. Procfile.dev-https
    # overrides these to HTTPS/WSS when the Rails page itself is served over TLS.
    server: <%= ENV.fetch("SHAKAPACKER_DEV_SERVER_PROTOCOL", "http") %>
    host: 0.0.0.0
    port: 3035
    # Hot Module Replacement updates modules while the application is running without a full reload
    hmr: true
    client:
      # Should we show a full-screen overlay in the browser when there are compiler errors or warnings?
      overlay: true
      # Avoid repeated console noise when the optional HMR websocket is unavailable.
      reconnect: false
      # WebSocket URL for HMR.  hostname is intentionally omitted so the browser
      # auto-detects it from the current page location — this lets the VNC browser
      # container reach the dev server via `app:3035` while plain localhost access
      # continues to work as `localhost:3035`.
      webSocketURL:
        pathname: "/ws"
        port: 3035
        protocol: <%= ENV.fetch("SHAKAPACKER_DEV_SERVER_WS_PROTOCOL", "ws") %>
    compress: true
    # 'all' is appropriate in the containerised dev environment: the dev server is
    # only reachable inside the Docker network so DNS-rebinding risk is minimal.
    # This allows access via `localhost`, `app`, and the container hostname without
    # triggering "Invalid Host header" errors in the VNC browser container.
    allowed_hosts: 'all'
    pretty: true
    headers:
      'Access-Control-Allow-Origin': '*'
    static:
      watch:
        ignored: '**/node_modules/**'

test:
  <<: *default
  compile: true

  # Compile test packs to a separate directory
  public_output_path: packs-test

production:
  <<: *default

  # Production depends on precompilation of packs prior to booting for performance.
  compile: false

  # Cache manifest.json for performance
  cache_manifest: true
