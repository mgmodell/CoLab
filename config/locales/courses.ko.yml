    wizard:
      advanced_switch: 고급 모드로 전환
      wizard_switch: 도움받기 모드로 전환
      name_number_lbl: 설명
      name_number_ttl: 어떤 수업인가요?
      name_number_desc: >
        수업 제목과 수업 식별자를 입력하세요. 이것이 귀하와 학생들에게 수업이 표시되는
        방식입니다. 원하는 것을 자유롭게 입력할 수 있지만 대부분의 학교에는 학생과 강사가
        익숙한 이름과 번호가 있으므로 여기에 사용해야 합니다.
      course_description_desc: >
        아래에서 수업 설명을 입력할 수 있습니다. 학생이나 강사에게 거의 표시되지 않으므로
        선택 사항이며 주로 귀하를 위한 것입니다.
      dates_lbl: 날짜
      dates_ttl: 이 수업은 언제 진행되나요?
      dates_desc: >
        이 수업의 시작 및 종료 날짜를 입력하세요. 모든 수업 활동은 이 날짜 내에 있어야 합니다.
        이 정보를 사용하여 상식 검사를 수행하고 활동이 의미 없는 날짜에 실수로 계획되지
        않도록 합니다.
      dates_timezone: >
        이 수업은 학교와 마찬가지로 {{timezone}} 시간대에서 진행된다고 가정합니다.
        그러나 여기를 클릭하여 변경할 수 있습니다. 해외 연수 수업을 위한 것일 수도 있지 않나요?
      confirm_create_lbl: 확인 및 만들기
      confirm_save_lbl: 요약
      confirm_save_ttl: 모두 맞나요?
      confirm_save_desc: >
        저장하기 전에 지금까지 입력한 모든 정보를 검토하여 올바른지 확인하세요.
        잘못된 내용이 있으면 클릭하여 돌아가서 수정하세요. 수업이 저장된 후에는
        활동을 추가하고 학생 등록을 시작할 수 있습니다.
      confirm_save_name: 수업 이름
      confirm_save_number: 수업 번호
      confirm_save_description: 수업 설명
      confirm_save_dates: >
        수업은 {{open_date}}에 시작하여 {{close_date}}에 마감됩니다.
        모두 {{timezone}} 시간대로 진행됩니다.
      instructors_lbl: 강사
      instructors_ttl: 이 수업을 가르칠 사람은 누구인가요?
      instructor_desc: >
        이 수업 강의에 참여하는 강사를 추가하세요.
      instructor_remove_desc: >
        참고: CoLab.online 학교 관리자만 수업에서 자신을 제거할 수 있습니다.
      project_lbl: 프로젝트 추가
      project_ttl: 그룹 프로젝트를 추가할까요?
      project_desc: >
        수업에 프로젝트를 만들면 학생들을 팀에 배정하고 매주 체크인하게 하여
        팀이 어떻게 진행되고 있는지 파악할 수 있습니다. 지금 팀을 만드시겠습니까?
      project_start_week: 프로젝트는 몇 주차에 시작해야 하나요?
      experience_sim_init: >
        CoLab.online은 학생들이 팀워크를 소개하고 기대할 것에 대한 토론을 촉진하는
        데 도움이 되는 시뮬레이션된 팀워크 경험을 통해 학생들을 안내할 수 있습니다.
        이를 제공하시겠습니까?
      project_support_site: >
        CoLab.online이 무엇을 하는지, 제공하는 것을 최대한 활용하는 더 많은 도구와
        우리가 기반한 연구의 일부를 보고 싶으시다면 방문하세요
      readings_lbl: 읽기 자료
      readings_ttl: 게임화된 협업 읽기를 추가할까요?
      readings_desc: >
        CoLab.online의 읽기 과제는 학생들에게 읽기에서 자신에게 의미 있는 용어를 추출하고
        정의하도록 요청하며, 그런 다음 강사에게 피드백을 제공할 기회를 줍니다. 그런 다음
        빙고 워크시트를 통해 게임 형식으로 새 어휘를 복습할 수 있습니다.
      students_lbl: 학생
      students_ttl: 학생 등록
      students_desc: >
        아래 상자에 이메일 주소를 입력하여 학생을 수동으로 등록할 수 있지만, 오른쪽
        이미지를 스캔하여 직접 등록하도록 하는 것이 더 쉽습니다. 이미지를 클릭하거나
        그 아래 텍스트를 클릭하여 강의계획서에 삽입하기 위해 이미지를 다운로드할 수 있습니다.
      enrollment_qr_lbl: 등록 QR 코드 다운로드
      next_btn: 다음
      prev_btn: 이전
      save_btn: 저장
      confirm_save_btn: "모두 맞습니다 &mdash; 만들겠습니다!"
    activities:
      type_col: 유형
      name_col: 이름
      status_col: 상태
      open_col: 시작 날짜
      close_col: 종료 날짜
      delete_lbl: 삭제
      save_first_msg: 활동을 추가하려면 수업을 먼저 저장해야 합니다.
      not_active_lbl: 활성화 안 됨
      active_lbl: 활성화됨
      expired_lbl: 기한 완료
