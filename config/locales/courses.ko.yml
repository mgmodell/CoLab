    drop: 제외
    courses: 수업
    drop_student_confirm_dlg: >
      이 사용자를 이 수업에서 제외하시겠습니까? 나중에 되돌릴 수 있지만 데이터 손실이
      발생하거나 학생에게 혼란을 줄 수 있습니다.
    drop_confirm_title: 수업에서 학생 제외 확인
