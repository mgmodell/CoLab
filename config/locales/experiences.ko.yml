    no_experiences: 경험 없음
    performance_explained: >
      이 값은 CoLab 내에서 배정된 시뮬레이션된 그룹 작업 경험의 평균 완료율을 반영합니다.
    inst_p1: >
      이 경험에서 학생은 한 학기 동안 진행된 협업 그룹 프로젝트에 대해 작성된 주간 일지를
      읽게 됩니다. 항목들은 프로젝트의 14주를 기록합니다. 학생은 가상의 인물이므로 개인
      정보 보호는 중요하지 않습니다. 각 내러티브를 읽으면서 <em>나열된 행동 중 그 주의
      그룹 역학을 <strong>가장 잘</strong> 특징짓는 <strong>하나</strong>의 행동을 결정하세요.</em>
    inst_p2: >
      내러티브의 14주에 대한 위의 작업을 수행한 후, 동일한 행동 목록을 사용하여 전체 학기에
      걸친 그룹의 행동에 대한 전반적인 평가를 요청받게 됩니다.
    inst_p3: >
      경험 중에 브라우저의 <em><strong>뒤로</strong> 버튼을 사용하지 마세요</em>. 어떤
      이유로든 중단해야 하는 경우 돌아왔을 때 멈춘 곳에서 계속할 수 있습니다.
    scenario_p1: >
      이 수업의 학생들은 이전에 함께 작업한 적이 없는 다른 세 학생과 함께 네 명으로 구성된
      그룹에서 연구 논문을 작성하고 있습니다. 논문을 완성하는 데 14주가 주어집니다.
    scenario_p2: >
      5주차에 제출해야 하는 첫 번째 과제는 그룹의 선택된 논문 주제와 요약이 포함된 예비
      참고 문헌 목록을 제출하는 것입니다. 9주차에는 초고를 제출합니다. 13주차에는 각 그룹이
      전체 수업에 공식적인 프레젠테이션을 하고 최종 논문은 14주차 말까지 강사에게 제출됩니다.
    scenario_p3: >
      각 그룹은 수업 외 시간에 만나 이 프로젝트를 진행해야 하며 정기적인 회의를 예약하는
      것이 권장됩니다. 마지막으로, 각 학생은 강사가 그룹이 어떻게 협력하는지 이해할 수 있도록
      모든 구성원의 기여를 자세히 기록하는 주간 반성 일지를 작성해야 합니다.
