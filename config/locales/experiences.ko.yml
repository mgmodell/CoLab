    no_experiences: 경험 없음
    performance_explained: >
      이 값은 CoLab 내에서 배정된 시뮬레이션된 그룹 작업 경험의
      평균 완료 수준을 반영합니다.
    inst_p1: >
      이 경험에서 학기 내내 진행되는 협업 그룹 프로젝트에 참여한 학생이 작성한
      주간 일지를 읽게 됩니다. 각 서술을 읽으면서 그 주의 그룹 역학을 가장 잘
      설명하는 행동을 결정하세요.
    inst_p2: >
      14주간의 서술에 대해 위의 작업을 수행한 후, 동일한 행동 목록을 사용하여
      그룹 행동에 대한 전체적인 평가를 요청받을 것입니다.
    inst_p3: >
      경험 중에 브라우저의 뒤로 버튼을 사용하지 마세요.
      어떤 이유로든 중단해야 하는 경우 돌아올 때 중단한 곳부터 계속할 수 있습니다.
    scenario_p1: >
      이 수업의 학생들은 처음 만나는 세 명의 학생들과 함께 4인 그룹으로 14주 동안
      연구 논문을 작업합니다.
    scenario_p2: >
      5주차에 마감되는 첫 번째 과제는 그룹의 선택된 논문 주제와 요약이 포함된
      예비 참고문헌 목록을 제출하는 것입니다.
    scenario_p3: >
      각 그룹은 수업 외에도 이 프로젝트를 위해 모임과 작업을 할 것이 요구되며,
      정기 회의 일정을 잡는 것이 권장됩니다.
