    demo:
      student_title: "Desafío de diseño"
      student_description: >
        Contribuye al espacio de diseño de la GRATITUD. Usa enfoques de diseño centrado en el ser
        humano para desarrollar una nueva forma de expresar, compartir o transmitir nuestra gratitud,
        afecto, bondad o apreciación a las comunidades más amplias en este momento crítico. La gratitud
        nos empodera, estimula la positividad en nuestros pensamientos y mejora nuestro bienestar físico
        y mental. (CHI 2022 Competencia de Diseño Estudiantil)
      instructor_title: "Vonnegut Favorito"
      instructor_description: >
        Un ensayo de 8-10 páginas profundizando en tu obra favorita de Kurt Vonnegut. El ensayo debe
        incluir un resumen de la obra, una discusión de los temas e ideas presentados, y una discusión
        de cómo la obra se relaciona con el contexto histórico en el que fue escrita y los temas de
        este curso.
