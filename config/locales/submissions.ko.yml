ko:
  submissions:
    feedbacks:
      demo_feedback_1: >
        훌륭한 초기 제출물입니다. 아직 할 일이 남아 있지만
        환상적인 시작입니다!
      demo_feedback_2: >
        이번 반복에서 좋은 진전을 이루었고 데이터 수집을 통해
        여러 디자인 결정을 개선했습니다. 계속하세요!
      demo_feedback_3: >
        계속 개선되고 있습니다. 이번에는 보고서와 프로토타입에
        상당한 기술적 수정이 있습니다. 큰 성장을 보여주고 있습니다!
    error:
      nothing_submitted: 제출된 과제가 없습니다
      withdraw_requires_submit: >
        실제로 제출되지 않은 과제는 취소할 수 없습니다.
      no_changes_on_withdrawal: >
        과제를 취소할 때 변경 사항을 만들 수 없습니다.
      no_update_error: 제출물이 성공적으로 저장되었습니다.
      no_create_error: 제출물이 성공적으로 만들어졌습니다.
      no_changes_once_submitted: >
        과제가 제출된 후에는 수정할 수 없습니다.
        새 제출물을 만들어야 합니다.
      update_failed: >
        과제를 저장할 수 없습니다. 아래 오류를 해결하고 다시 시도하세요.
