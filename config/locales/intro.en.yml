    students:
        title: CoLab features for students
        intro: >
            CoLab has a variety of features to help you succeed as a student and
            as part of a team.
        gamification:
            title: Gamification
            line_one: >
                Games are fun, right?
            line_two: >
                Too bad not everything's a game, right?
            line_three: >
                Gamification takes what we know about games to make everyday activities
                more game-like.
            line_four: >
                That makes it more fun!
        feedback:
            title: Feedback
            line_one: >
                Good feedback helps know if you're on the right track or if you've 
                veered off course.
            line_two: >
                Too bad it's not always easy to give or receive, right?
            line_three: >
                Our activities package up what we learn to get it to those who can
                keep you on track.
            line_four: >
                That makes it more useful!
        voice:
            title: Be noticed
            line_one: >
                Do you ever feel like no one sees what you do for your team?
            line_two: >
                Our check-ins give your instructor vital insight into your experience.
            line_three: >
                And they can be completed in just a few minutes on any smart device.
            line_four: >
                Our instructors want to hear your voice and we're making it easy for them to listen!

    instructors:
        title: CoLab features for instructors
        intro: CoLab has a variety of features to help you support your student teams.
        click: Click Me!
        contracts:
            title: Team Contracts
            line_one: >
                Teamwork contracts are highly effective if students actively participate
                in authoring them.
            line_two: >
                Instructors can easily kickstart this process by utilizing our
                template contract.
            line_three: >
                But both teachers and students must carefully review the agreement
                before signing.
            line_four: >
                Skipping review provides a valuable, real-world lesson in commitment.
            line_five: >
                We encourage you to reinforce this with videos of team meetings.
        simulation: 
            title: Team Simulations
            line_one: >
                Transform how students understand teams with immersive group
                work simulations.
            line_two: >
                Students read weekly journal entries from fictional team members.
            line_three: >
                They actively evaluate the complex group dynamics as they unfold.
            line_four: >
                We offer multiple journals from different members of the team
                for perspective.
            line_five: >
                Use our slide template to easily kickstart insightful classroom discussion.
        perspective:
            title: Perspective Points
            line_one: >
                Drive classroom innovation by building perspective-rich, high-performing
                student groups.
            line_two: >
                Teams formed around diverse perspectives unlock creative problem-solving
                and empathy.
            line_three: >
                Instructors can incentivize this by establishing a Perspective Points
                target for teams.
            line_four: >
                The platform calculates Perspective Points based on student backgrounds
                and experiences.
            line_five: >
                Intentional, data-driven team formation encourages your students to value
                perspective.
        viz:
            title: Visualizations
            line_one: >
                Our activities run on the data your students generate.
            line_two: >
                It is far too much to make meaning by poring over it on our own.
            line_three: >
                CoLab's visualizations make it easy to understand this data so you can act on it.
            line_four: >
                For example, Check-Ins get turned into charts of the student experience.
            line_five: >
                Monitoring these charts lets you intervene to help when they need it most.
    about:
        title: About CoLab
        giving_voice: >
            Micah Gideon Modell built CoLab to give his student teams a voice.
        became_research: >
            He couldn't let it go, so it became part of his research agenda.
        experimented: >
            He experimented with visualizations and gamification.
        student_involvement: >
            His students got involved and now it's available for you to use, too!
        not_done: And we're not done yet!
        policy_link: Privacy Policy
        tos_link: Terms of Service
        policy_tos: >
            Please review our Privacy Policy and our Terms of Service.

    why_slides:
        captions:
            one_one: >
                Collaboration can look different for 
                everyone. 
            one_two: >
                But have you ever experienced any of these scenarios
                in group projects?
            two_one: >
                Let's take a look at some examples of unequal group 
                work participation...
            two_two: >
                Group Domination: One person takes over and 
                thinks everyone else's opinion is not good enough
            three_one: Have you ever been a George?
            three_two: > 
                Leave it to George: One person does all the work and 
                everyone else watches
            four_one: Or maybe this sounds familiar? 
            four_two: >
                Social loafers or Free Riders: One or more students
                slack off while everyone else does the work 
            five_one: What would you do in these situations?     
            five_two: >
                Do you have to wait until the end of the semester to get help
                from your professor?
            six_one: >
                What if there was a way for your professor to help
                before things got out of hand? 
            six_two: Now there is!
            seven_one: 
                title: CoLab.online can help!
                check-ins: Weekly self- and peer-assessment check-ins
                growth: Growth focused (not judgment)
                visualizations: Visualizations
                diversity: Diversity-focused group composition
                gamification: Gamified collaborative reading
                simulations: Simulated team experience
                iterative_assignments: Iterative assignments
            seven_two:
                title: Are you a...
                student: Student?
                instructor: Instructor?
                
