      student_title: 디자인 챌린지
      student_description: >
        감사(GRATITUDE)의 디자인 공간에 기여하세요. 인간 중심 디자인 접근법을 사용하여
        더 넓은 커뮤니티에 감사, 애정, 친절 또는 감사를 표현하고 공유하거나 전달하는
        새로운 방법을 개발하세요.
      instructor_title: 좋아하는 보네거트
      instructor_description: >
        커트 보네거트의 작품 중 가장 좋아하는 것에 대한 8-10페이지 분량의 논문.
        작품 요약, 주제 및 아이디어에 대한 논의, 그리고 작품이 저술된 역사적
        맥락과 이 수업의 주제들과 어떻게 관련되는지에 대한 논의가 포함되어야 합니다.
