    demo:
      student_title: 디자인 챌린지
      student_description: >
        감사의 디자인 공간에 기여하세요. 인간 중심 디자인 접근 방식을 활용하여 더 넓은 커뮤니티에
        감사, 애정, 친절 또는 감사를 표현하고, 공유하거나 전달하는 새로운 방법을 개발하세요.
        감사는 우리에게 힘을 주고, 생각에 긍정성을 자극하며, 신체적·정신적 웰빙을 향상시킵니다.
        (CHI 2022 학생 디자인 대회)
      instructor_title: 좋아하는 보네것
      instructor_description: >
        커트 보네것의 작품 중 가장 좋아하는 작품을 깊이 다루는 8-10페이지 분량의 논문.
        작품 요약, 주제와 아이디어에 대한 논의, 그리고 그 작품이 작성된 역사적 맥락과
        이 과정의 주제와 어떻게 관련되는지에 대한 논의가 포함되어야 합니다.
    error:
      submission_type: 최소한 하나의 제출 유형을 선택해야 합니다
