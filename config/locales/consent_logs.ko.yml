ko:
  consent_logs:
    title: 동의 응답 업데이트
    edit:
      opening: 연구 목적으로 귀하의 데이터를 사용해도 됩니까?
      title: 동의서
      instructions: >
        CoLab은 연구 결과를 기반으로 구축되었습니다 &mdash; CoLab이 제공하는 모든 혜택은
        귀하와 같은 학생들의 데이터와 경험에 대한 엄격한 분석의 결과입니다. 따라서 연구자들은
        귀하의 데이터를 연구에 사용할 수 있는 허가를 요청합니다. 아래 문서를 검토하세요.
        전체 문서를 보려면 스크롤해야 할 수 있습니다. 이 문서의 조건에 따라 귀하의 정보가
        사용되는 것에 동의하시면 아래 "동의합니다" 상자를 체크하세요.
        언제든지 이 문서로 돌아와 응답을 변경할 수 있습니다.
      submit_response: 이 동의서에 대한 내 응답 기록
      consent_dl: 이 문서 사본 다운로드
      accept: 동의합니다
