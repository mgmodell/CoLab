ko:
  graphing:
    instructions: >
      이 페이지를 사용하여 학생들에게 사용 가능한 데이터를 시각화하세요.
    admin_instructions: >
      모든 데이터는 실제 데이터입니다. 공개 청중에게 발표할 때는 익명화 기능을 사용하고
      동의를 제공한 사용자로 필터링하세요.
    lay_instructions: >
      모든 데이터는 실제 데이터이지만 모든 청중에게 적합하도록 익명화되었습니다.
    agree: 동의
    disagree: 비동의
    consent_switch: 동의한 사용자만 표시
    anon_switch: 데이터 익명화
    anon_confirm_title: 기존 차트를 지울까요?
    anon_confirm: >
      혼동을 방지하기 위해 연구 중심 차트와 교육 중심 차트를 동시에 표시하지 않습니다.
      따라서 이 변경은 아래의 모든 차트를 제거합니다. 계속하시겠습니까?
    projects_list: 프로젝트 선택
    group_list: 그룹 선택
    individual_list: 개인 선택
    loading: 데이터 로딩 중
    chart_for_group: "{{subject}}의 그룹 차트"
    chart_for_individual: "{{subject}}의 개인 차트"
    chart_for_project: 프로젝트용
    none: 선택 없음
    date: 날짜
    contribution_lvl: 기여 수준
    chart_dwn_warn: >
      이 차트 다운로드 기능은 실험적이며 Chrome에서만 작동합니다. 또한 이후에 차트를
      다시 로드해야 할 수도 있습니다. 진행하시겠습니까?
    chart_for: " 차트 "
    for_project: 프로젝트용
    group: "그룹 "
    and_group: " 및 그룹 "
    wrote: " 작성"
    value: 값
    ind_ad: 모든 데이터
    ind_ab: 행동별 평균
    ind_ao: 전체 평균
    ind_ag_g: 그룹 일치도
    ind_ag_s: 자신과의 일치도
    ind_ag_m: 자신 제외 일치도
    g_ad: 모든 데이터
    g_am: 구성원별 평균
    g_vb: 행동별 분산
    g_vm: 구성원별 분산
    g_ag_b: 행동별 일치도
    g_ag_m: 구성원별 일치도
    low: 낮음
    high: 높음
    click_for_more: 간편 보기 클릭
    index:
      who: 누구를 보고 싶으신가요?
      what_data: 어떤 데이터를 보고 싶으신가요?
      which: 어떤 프로젝트?
