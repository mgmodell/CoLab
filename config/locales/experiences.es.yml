    no_experiences: Sin experiencias
    performance_explained: >
      Este valor refleja tu nivel promedio de finalización de las
      experiencias de trabajo en grupo simuladas asignadas dentro de CoLab.
    inst_p1: >
      En esta experiencia, leerás un diario semanal escrito por un estudiante en un
      proyecto de grupo colaborativo de un semestre. Decide qué comportamiento
      caracteriza mejor la dinámica del grupo esa semana.
    inst_p2: >
      Después de completar las 14 semanas, se te pedirá tu evaluación general
      del comportamiento del grupo.
    inst_p3: >
      Por favor no uses el botón de retroceso de tu navegador durante la experiencia.
    scenario_p1: >
      Los estudiantes de esta clase trabajan en un trabajo de investigación en grupos de
      cuatro, con otros tres estudiantes con quienes no han trabajado antes.
    scenario_p2: >
      La primera tarea, que vence en la semana 5, es enviar el tema del trabajo
      seleccionado por el grupo y una lista preliminar de referencias con resúmenes.
    scenario_p3: >
      Se espera que cada grupo se reúna y trabaje en este proyecto fuera de clase,
      y se recomienda programar reuniones recurrentes.
