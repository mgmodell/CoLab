    why_slides:
        captions:
            one_one: >
                협업은 사람마다 다르게 보일 수 있습니다.
            one_two: >
                그룹 프로젝트에서 이런 상황을 경험한 적이 있으신가요?
            two_one: >
                불균등한 그룹 작업 참여의 몇 가지 예를 살펴봅시다...
            two_two: >
                그룹 지배: 한 사람이 주도하고 다른 사람의 의견은
                충분하지 않다고 생각하는 경우
            three_one: 조지가 된 적이 있으신가요?
            three_two: >
                조지에게 맡겨두기: 한 사람이 모든 일을 하고
                나머지는 지켜보는 경우
            four_one: 이런 상황이 익숙하게 느껴지시나요?
            four_two: >
                소셜 무임승차자: 한 명 이상의 학생이 빈둥거리는 동안
                나머지가 모든 일을 하는 경우
            five_one: 이런 상황에서 어떻게 하시겠습니까?
            five_two: >
                교수님의 도움을 받기 위해 학기 말까지 기다려야 하나요?
            six_one: >
                일이 걷잡을 수 없게 되기 전에 교수님이 도움을
                줄 수 있는 방법이 있다면 어떨까요?
            six_two: 이제 있습니다!
            seven_one:
                title: 당신에게 CoLab.online이 필요한 이유입니다!
                check-ins: 매주 자기평가 및 동료평가 진행
                growth: 비판이 아닌 성장에 중점을 둔 피드백
                visualizations: 협력도 시각화
                diversity: 다양성을 고려한 그룹 구성
                gamification: 게임화된 협업 읽기
                simulations: 시뮬레이션을 통한 협력 체험
                iterative_assignments: 반복 실행 과제
            seven_two:
                title: 당신은 누구입니까?
                student: 학생?
                instructor: 강사?

    images:
        student_concern: 학생이 교사에게 이야기하는 모습
